name: Daily job collection

on:
  schedule:
    # Off-peak minute to reduce schedule delays/skips; adjusts from UTC to ~06:17 Amsterdam time
    - cron: "17 4 * * *"
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit the last-run timestamp

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run collector
        working-directory: backend
        run: node scripts/collect.js && node scripts/classify.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # Commit a timestamp so this workflow is never auto-disabled after 60 days idle
      - name: Stamp last run
        run: |
          echo "${{ github.run_id }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/last-collect.txt
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .github/last-collect.txt
          git diff --staged --quiet || git commit -m "chore: collect run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
